<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cohort 利润分析仪表盘</title>
<style>
:root{--bg:#f0f2f7;--s:#fff;--s2:#f8fafc;--s3:#f1f5f9;--bd:#e2e8f0;--bd2:#cbd5e1;--t:#0f172a;--t2:#475569;--t3:#94a3b8;--p:#4f46e5;--pl:#eef2ff;--pb:#c7d2fe;--g:#16a34a;--gb:#f0fdf4;--gbd:#bbf7d0;--a:#d97706;--ab:#fffbeb;--abd:#fde68a;--r:#dc2626;--rb:#fef2f2;--rbd:#fecaca;--rad:12px;--sh:0 1px 3px rgba(0,0,0,.06);--f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;--tr:.2s ease}
[data-theme="dark"]{--bg:#0f172a;--s:#1e293b;--s2:#1e293b;--s3:#334155;--bd:#334155;--bd2:#475569;--t:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--p:#818cf8;--pl:#1e1b4b;--pb:#4338ca;--g:#4ade80;--gb:#052e16;--gbd:#166534;--a:#fbbf24;--ab:#451a03;--abd:#92400e;--r:#f87171;--rb:#450a0a;--rbd:#991b1b;--sh:0 1px 3px rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0}body{font-family:var(--f);background:var(--bg);color:var(--t);line-height:1.6;font-size:15px;transition:background var(--tr),color var(--tr)}
.page{max-width:1440px;margin:0 auto;padding:16px 24px 48px}
.hdr{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.hdr-left{flex:1;min-width:240px}
.eyebrow{display:inline-flex;padding:5px 12px;border-radius:999px;background:var(--pl);color:var(--p);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.title{margin:6px 0 2px;font-size:24px;font-weight:800}
.subtitle{color:var(--t2);font-size:14px}
.hdr-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--bd);background:var(--s);padding:8px 14px;border-radius:8px;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--tr);white-space:nowrap}
.btn:hover{border-color:var(--p);color:var(--p);background:var(--pl)}
.btn-sm{padding:5px 10px;font-size:13px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:8px;font-size:14px}
.msw{display:inline-flex;padding:2px;background:var(--s3);border:1px solid var(--bd);border-radius:8px}
.msw-btn{border:0;background:transparent;padding:6px 16px;border-radius:6px;font-weight:700;font-size:14px;color:var(--t3);cursor:pointer;transition:all var(--tr)}
.msw-btn.active{background:var(--s);color:var(--t);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.scn{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.schip{padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s);font-size:13px;font-weight:700;cursor:pointer;transition:all var(--tr)}
.schip.active{border-color:var(--p);background:var(--pl);color:var(--p)}
.schip:hover{border-color:var(--p)}

/* Cards */
.card{background:var(--s);border:1px solid var(--bd);border-radius:var(--rad);padding:20px;box-shadow:var(--sh);transition:background var(--tr)}
.card+.card{margin-top:14px}
.card-t{font-weight:800;font-size:16px;margin-bottom:3px}
.card-s{font-size:13px;color:var(--t3)}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px}

/* Param grid: L1 left, big table right */
.param-grid{display:grid;grid-template-columns:320px 1fr;gap:14px;align-items:start}

/* L1 compact inputs */
.f-grid{display:grid;gap:6px}
.f-row{display:grid;grid-template-columns:1fr 120px;gap:8px;align-items:center;padding:7px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;font-size:14px}
.f-row.primary{border-color:var(--pb);background:var(--pl)}
.f-lbl{color:var(--t2);font-size:13px;font-weight:600}
.f-row.primary .f-lbl{color:var(--t);font-weight:700}
.f-val{font-weight:700;text-align:right;font-variant-numeric:tabular-nums;font-size:14px;color:var(--t)}
.f-formula{font-size:11px;color:var(--t3);font-family:'SF Mono','Menlo',monospace;text-align:right;grid-column:1/-1}
.f-inp{width:100%;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;text-align:right;background:var(--s);font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;color:var(--t)}
.f-inp:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 2px rgba(79,70,229,.12)}

/* Big stage table */
.stbl{width:100%;border-collapse:collapse;font-size:14px;font-variant-numeric:tabular-nums;table-layout:fixed}
.stbl th,.stbl td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}
.stbl th{background:var(--s3);color:var(--t2);font-weight:700;text-align:center;font-size:13px;position:sticky;top:0;z-index:1}
.stbl th:first-child{text-align:left;width:130px}
.stbl td:first-child{color:var(--t2);font-weight:600;font-size:13px;white-space:nowrap}
.stbl td:not(:first-child){text-align:center}
.stbl tr:hover td{background:rgba(79,70,229,.03)}
.stbl .sec td{background:var(--s3);font-weight:800;color:var(--t);font-size:13px;border-bottom:2px solid var(--bd2);padding:10px}
.stbl .tinp{width:80px;padding:5px 6px;border:1px solid var(--bd);border-radius:5px;text-align:right;background:var(--s);font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;color:var(--t)}
.stbl .tinp:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 2px rgba(79,70,229,.12)}
.stbl .auto{color:var(--t3);font-weight:600;font-size:13px}
.stbl .val{font-weight:700;font-size:14px}
.stbl .sub{font-size:11px;color:var(--t3);display:block;margin-top:1px}
.stbl .pos{color:var(--g)}
.stbl .neg{color:var(--r)}

/* Divider */
.divider{border:0;border-top:2px solid var(--bd);margin:20px 0}

/* KPI */
.kpi-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;transition:all var(--tr)}
.kpi-l{color:var(--t3);font-size:12px;font-weight:600}
.kpi-v{font-size:22px;font-weight:900;margin-top:4px;font-variant-numeric:tabular-nums}
.kpi-f{font-size:11px;color:inherit;opacity:.55;margin-top:3px;font-family:'SF Mono','Menlo',monospace}
.kpi.good{background:var(--gb);border-color:var(--gbd);color:var(--g)}
.kpi.warn{background:var(--ab);border-color:var(--abd);color:var(--a)}
.kpi.bad{background:var(--rb);border-color:var(--rbd);color:var(--r)}
.kpi-detail{margin-top:6px;display:grid;gap:3px}
.kpi-line{display:flex;justify-content:space-between;font-size:13px;gap:6px}
.kpi-line strong{font-weight:800}

/* Insight */
.insight{margin-top:10px;padding:12px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;display:flex;gap:8px;align-items:flex-start;font-size:14px;color:var(--t2);line-height:1.6}
.insight b{color:var(--t)}

/* Funnel */
.funnel{display:flex;align-items:flex-end;gap:3px;padding:14px 8px;justify-content:center}
.fstg{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;max-width:130px}
.fbar{width:100%;border-radius:5px;background:var(--p);min-height:6px;position:relative;transition:height .4s ease}
.fbar::after{content:attr(data-c);position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;color:var(--t);white-space:nowrap}
.fname{font-size:12px;color:var(--t2);font-weight:700}
.farr{color:var(--t3);font-size:16px;font-weight:700;margin-bottom:18px;flex-shrink:0}
.frate{font-size:11px;color:var(--p);font-weight:800}

/* Charts */
.chg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chc{background:var(--s);border:1px solid var(--bd);border-radius:var(--rad);padding:12px;box-shadow:var(--sh)}
.cht{font-size:14px;font-weight:800;margin-bottom:6px}
.chcv{width:100%;height:200px}

/* Data table */
.tw{overflow-x:auto;border-radius:8px;border:1px solid var(--bd)}
.dt{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
.dt th,.dt td{padding:8px 12px;text-align:right;border-bottom:1px solid var(--bd)}
.dt th{background:var(--s3);color:var(--t2);font-weight:700;font-size:13px}
.dt th:first-child,.dt td:first-child{text-align:left}
.dt tr:hover td{background:var(--pl)}
.pos{color:var(--g);font-weight:700}.neg{color:var(--r);font-weight:700}

/* Impact */
.imp-list{display:grid;gap:6px}
.imp-r{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:8px 12px;border:1px solid var(--bd);background:var(--s2);border-radius:8px}
.imp-r:hover{border-color:var(--pb)}
.imp-n{font-weight:800;font-size:13px}
.imp-s{font-size:12px;color:var(--t3);margin-top:1px}
.imp-rt{display:flex;align-items:center;gap:8px}
.imp-bg{width:100px;height:5px;border-radius:3px;background:var(--bd);overflow:hidden}
.imp-fl{height:100%;border-radius:3px;background:var(--p);transition:width .3s}
.imp-fl.neg{background:var(--r)}
.imp-d{font-size:13px;font-weight:900;font-variant-numeric:tabular-nums;min-width:55px;text-align:right}
.help{color:var(--t3);font-size:12px;margin-top:6px}

/* Profit Uplift Predictor */
.pred-tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:2px solid var(--bd)}
.pred-tab{padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all var(--tr)}
.pred-tab:hover{color:var(--t)}
.pred-tab.active{color:var(--p);border-bottom-color:var(--p)}
.pred-tab.impossible{opacity:.4;cursor:not-allowed}
.pred-summary{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.pred-cur{padding:12px 16px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;font-size:14px;flex:1;min-width:120px}
.pred-cur b{font-size:16px;display:block;margin-top:2px;font-variant-numeric:tabular-nums}
.pred-tgt{padding:12px 16px;background:var(--pl);border:1px solid var(--pb);border-radius:8px;font-size:14px;flex:1;min-width:120px;color:var(--p)}
.pred-tgt b{font-size:16px;display:block;margin-top:2px;font-variant-numeric:tabular-nums}
.pred-achieved{padding:12px 16px;border-radius:8px;font-size:14px;flex:1;min-width:120px}
.pred-achieved.ok{background:var(--gb);border:1px solid var(--gbd);color:var(--g)}
.pred-achieved.no{background:var(--rb);border:1px solid var(--rbd);color:var(--r)}
.pred-achieved b{font-size:16px;display:block;margin-top:2px;font-variant-numeric:tabular-nums}
.pred-tbl{width:100%;border-collapse:collapse;font-size:14px;font-variant-numeric:tabular-nums}
.pred-tbl th,.pred-tbl td{padding:8px 10px;border-bottom:1px solid var(--bd);text-align:left}
.pred-tbl th{background:var(--s3);font-weight:700;color:var(--t2);font-size:13px;position:sticky;top:0}
.pred-tbl td:nth-child(n+2){text-align:right}
.pred-tbl th:nth-child(n+2){text-align:right}
.pred-tbl tr:hover td{background:rgba(79,70,229,.03)}
.pred-tbl .delta{font-weight:800}
.pred-tbl .delta.pos{color:var(--g)}
.pred-tbl .delta.neg{color:var(--r)}
.pred-arrow{color:var(--p);font-weight:900;padding:0 4px}
.pred-note{margin-top:10px;padding:12px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;font-size:13px;color:var(--t2);line-height:1.6}
.pred-note b{color:var(--t)}
.pred-bar-wrap{display:flex;align-items:center;gap:6px}
.pred-bar-bg{flex:1;height:6px;background:var(--bd);border-radius:3px;overflow:hidden;min-width:60px}
.pred-bar-fill{height:100%;border-radius:3px;background:var(--p);transition:width .3s}
.pred-bar-lbl{font-size:10px;color:var(--t3);font-weight:700;min-width:36px;text-align:right}

.tooltip{position:fixed;pointer-events:none;background:rgba(15,23,42,.94);color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.4;max-width:260px;box-shadow:0 8px 20px rgba(0,0,0,.25);z-index:9999;display:none;backdrop-filter:blur(8px)}

@media print{body{background:#fff!important}.hdr-actions,.msw,.btn,.scn{display:none!important}.card,.chc,.kpi,.imp-r{break-inside:avoid;box-shadow:none!important}}
@media(max-width:900px){.param-grid{grid-template-columns:1fr}.chg{grid-template-columns:1fr}.kpi-g{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.kpi-g{grid-template-columns:1fr}.funnel{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="hdr-left">
      <div class="eyebrow">Cohort Profit Analyzer</div>
      <div class="title">声乐 SKU｜单 Cohort 现金 + 确认收入利润</div>
      <div class="subtitle">上半区输入参数，下半区查看结果。支持建模预测与实际复盘。</div>
    </div>
    <div class="hdr-actions">
      <div class="msw" id="modeSwitch"><button class="msw-btn active" data-mode="model">建模预测</button><button class="msw-btn" data-mode="actual">实际发生</button></div>
      <button class="btn-icon btn" id="themeToggle" title="主题">🌙</button>
      <button class="btn" id="reset">↺ 重置</button>
      <button class="btn" id="export">↓ 导出</button>
      <input id="import-file" type="file" accept="application/json" style="display:none"/>
      <button class="btn" id="import">↑ 导入</button>
    </div>
  </div>
  <div class="scn" id="scenarioBar"></div>

  <!-- ========== PART 1: PARAMS ========== -->
  <div class="card">
    <div class="card-h"><div><div class="card-t">参数输入</div><div class="card-s" id="modeLabel">建模预测模式：输入效率参数，金额自动联动</div></div></div>
    <div class="param-grid">
      <div id="l1Panel"></div>
      <div id="stageTable"></div>
    </div>
  </div>

  <hr class="divider"/>

  <!-- ========== PART 2: RESULTS ========== -->
  <div class="card">
    <div class="card-h"><div><div class="card-t">核心结果</div></div></div>
    <div class="kpi-g" id="kpis"></div>
    <div class="insight" id="insightBox"></div>
  </div>

  <div class="card" style="margin-top:12px">
    <div class="card-h"><div><div class="card-t">用户漏斗</div></div></div>
    <div class="funnel" id="funnelChart"></div>
  </div>

  <div class="chg" style="margin-top:12px">
    <div class="chc"><div class="cht" id="t_cashM">现金（月度）</div><canvas class="chcv" id="c_cashM"></canvas></div>
    <div class="chc"><div class="cht" id="t_cashC">现金（累计）</div><canvas class="chcv" id="c_cashC"></canvas></div>
    <div class="chc"><div class="cht" id="t_profM">利润（月度）</div><canvas class="chcv" id="c_profM"></canvas></div>
    <div class="chc"><div class="cht" id="t_profC">利润（累计）</div><canvas class="chcv" id="c_profC"></canvas></div>
  </div>

  <div class="card" style="margin-top:12px">
    <div class="card-h"><div><div class="card-t">月度明细</div></div><button class="btn btn-sm" id="toggleTable">展开</button></div>
    <div id="tableWrap" style="display:none"></div>
  </div>

  <div class="card" style="margin-top:12px">
    <div class="card-h"><div><div class="card-t">参数影响力</div><div class="card-s">对利润率影响最大的杠杆</div></div></div>
    <div id="impactPanel"></div>
  </div>

  <div class="card" style="margin-top:12px">
    <div class="card-h"><div><div class="card-t">🎯 利润率提升路径</div><div class="card-s">自动计算达到目标利润率需要调整的参数组合</div></div></div>
    <div id="predTabs" class="pred-tabs"></div>
    <div id="predContent"></div>
  </div>

</div>
<div id="tooltip" class="tooltip"></div>

<script>
const DP={tax:.045,headquarter:.06,low_price:1880,reg_price:2980,L2_num_low_price:900,L2_num_reg_price:1800,L1_ROI:1.5,L1_cost_employee:.25,L1_open_rate:.98,L1_cost_refund:.03,L1_cost_others:.1,content_salary:50000,L3_price:2980,L4_price:4980,L5_price:6980,L2_cvr_low_price:.35,L2_cvr_reg_price:.48,L3_cvr:.55,L4_cvr:.55,L2_open_rate:.98,L3_open_rate:.98,L4_open_rate:.98,L2_cost_refund:.03,L3_cost_refund:.03,L4_cost_refund:.03,L2_cost_others:.1,L3_cost_others:.1,L4_cost_others:.1,L5_cost_others:.1,L2_ta_salary:21500,L2_ta_capacity:250,L2_service_period:3,L3_ta_salary:21500,L3_ta_capacity:250,L3_service_period:3,L4_ta_salary:21500,L4_ta_capacity:250,L4_service_period:3,L5_ta_salary:21500,L5_ta_capacity:250,L5_service_period:3,L1_to_L2_wait_days:25,L2_to_L3_wait_days:25,L3_to_L4_wait_days:25,L4_to_L5_wait_days:25,L1_refund_count:54,L1_refund_amount:211680,L1_freeze_count:0,L1_unhandoff_count:0,L2_refund_count:24,L2_refund_amount:103257,L2_freeze_count:0,L2_unhandoff_count:0,L3_refund_count:13,L3_refund_amount:93076,L3_freeze_count:0,L3_unhandoff_count:0,L4_refund_count:7,L4_refund_amount:70358,L4_freeze_count:0,L4_unhandoff_count:0,L2_instructor_salary:0,L3_instructor_salary:0,L4_instructor_salary:0,L5_instructor_salary:0,L2_director_salary:0,L3_director_salary:0,L4_director_salary:0,L5_director_salary:0,L2_starter_kit_count:0,L3_starter_kit_count:0,L4_starter_kit_count:0,L5_starter_kit_count:0,L2_sd_paid:0,L3_sd_paid:0,L4_sd_paid:0,L5_sd_paid:0,L2_sd_delay:0,L3_sd_delay:0,L4_sd_delay:0,L5_sd_delay:0,L2_sd_renew:0,L3_sd_renew:0,L4_sd_renew:0,L5_sd_renew:0,L2_sd_gmv_course:0,L3_sd_gmv_course:0,L4_sd_gmv_course:0,L5_sd_gmv_course:0,L2_sd_gmv_other:0,L3_sd_gmv_other:0,L4_sd_gmv_other:0,L5_sd_gmv_other:0,L2_sd_refund_count:0,L3_sd_refund_count:0,L4_sd_refund_count:0,L5_sd_refund_count:0,L2_sd_refund_amt:0,L3_sd_refund_amt:0,L4_sd_refund_amt:0,L5_sd_refund_amt:0,L2_sd_ta_count:0,L3_sd_ta_count:0,L4_sd_ta_count:0,L5_sd_ta_count:0,L2_sd_ta_salary:0,L3_sd_ta_salary:0,L4_sd_ta_salary:0,L5_sd_ta_salary:0,L2_sd_instructor_salary:0,L3_sd_instructor_salary:0,L4_sd_instructor_salary:0,L5_sd_instructor_salary:0,L2_sd_director_salary:0,L3_sd_director_salary:0,L4_sd_director_salary:0,L5_sd_director_salary:0,L2_sd_other_cost:0,L3_sd_other_cost:0,L4_sd_other_cost:0,L5_sd_other_cost:0,L2_sd_service_period:3,L3_sd_service_period:3,L4_sd_service_period:3,L5_sd_service_period:3,L2_sd_settle_price:0,L3_sd_settle_price:0,L4_sd_settle_price:0,L5_sd_settle_price:0,L2_sd_next_tuition:0,L3_sd_next_tuition:0,L4_sd_next_tuition:0,L5_sd_next_tuition:0};

function gDV(v,t,i){if(t==='p')return fN(v*100,2);if(t==='c')return fI(v);return i?fI(v):(Number.isInteger(v)?String(v):fN(v,2))}
function nB(d,v){if(d.i)return Math.max(Math.round(v),0);if(d.t==='p')return cl(v>1?v/100:v,0,1);return Math.max(v,0)}
function aB(id,raw){const d=BD[id];if(!d)return;const m=CM(P);d.w(P,nB(d,raw),m);render();save()}
function syncAR(){
  const p=P;
  p.L1_open_rate=oF((p.L2_num_low_price||0)+(p.L2_num_reg_price||0),p.L1_refund_count,p.L1_freeze_count,p.L1_unhandoff_count).rate;
  p.L2_open_rate=oF(rU((p.L2_num_low_price||0)*(p.L2_cvr_low_price||0)+(p.L2_num_reg_price||0)*(p.L2_cvr_reg_price||0)),p.L2_refund_count,p.L2_freeze_count,p.L2_unhandoff_count).rate;
  let m=CM(p);p.L3_open_rate=oF(rU((m.L3n||0)*(p.L3_cvr||0)),p.L3_refund_count,p.L3_freeze_count,p.L3_unhandoff_count).rate;
  m=CM(p);p.L4_open_rate=oF(rU((m.L4n||0)*(p.L4_cvr||0)),p.L4_refund_count,p.L4_freeze_count,p.L4_unhandoff_count).rate;
  m=CM(p);p.L1_cost_refund=m.L1r<=0?0:cl((p.L1_refund_amount||0)/m.L1r,0,1);
  p.L2_cost_refund=m.L2tr<=0?0:cl((p.L2_refund_amount||0)/m.L2tr,0,1);
  p.L3_cost_refund=m.L3tr<=0?0:cl((p.L3_refund_amount||0)/m.L3tr,0,1);
  p.L4_cost_refund=m.L4tr<=0?0:cl((p.L4_refund_amount||0)/m.L4tr,0,1);
}

function renderL1(){
  const p=P,m=CM(p),acq=m.L1r*m.cac,emp=m.L1r*p.L1_cost_employee,oL=1-p.L1_open_rate;
  const l1T=(p.L2_num_low_price||0)+(p.L2_num_reg_price||0);
  const l1OF=oF(l1T,p.L1_refund_count,p.L1_freeze_count,p.L1_unhandoff_count);
  const fr=(l,v,f)=>`<div class="f-row"><div class="f-lbl">${l}</div><div class="f-val">${v}</div>${f?`<div class="f-formula">${f}</div>`:''}</div>`;
  const fi=(bid,l,pri)=>{const d=BD[bid],v=d.g(P,m);return `<div class="f-row${pri?' primary':''}"><div class="f-lbl">${l}</div><input class="f-inp" value="${gDV(v,d.t,d.i)}" data-bind="${bid}"/></div>`};
  let h='<div class="f-grid">';
  h+=`<div style="font-weight:800;font-size:12px;color:var(--t);padding:4px 0">一阶参数</div>`;
  h+=fi('low_price','低价课价格')+fi('reg_price','正价课价格');
  h+=fi('L2_num_low_price','低价报名人数')+fi('L2_num_reg_price','正价报名人数');
  if(VM==='model'){
    h+=fi('L1_ROI','投放 ROI',true);
    h+=fr('获客成本率',fP2(m.cac),`1÷ROI`)+fr('获客费用',fC(acq),`收入×成本率`);
    h+=fi('L1_cost_employee','人员成本率')+fr('人员成本',fC(emp),`收入×成本率`);
    h+=fi('L1_open_rate','开课率')+fr('未开课损失',fC(m.L1r*oL),`收入×${fP(oL)}`);
    h+=fi('L1_cost_refund','退款率')+fi('L1_cost_others','其他成本率');
  } else {
    h+=fi('actual_cac_amount','获客费用',true)+fr('ROI(反算)',fN(p.L1_ROI,2),`收入÷费用`);
    h+=fi('actual_employee_amount','人员成本')+fr('成本率(反算)',fP2(p.L1_cost_employee));
    h+=fr('成交人数',fU(l1T));
    h+=fi('L1_refund_count','退费人数')+fi('L1_freeze_count','冻课人数')+fi('L1_unhandoff_count','未交接人数');
    h+=fr('开课人数',fU(l1OF.open),`${fI(l1T)}-${fI(p.L1_refund_count)}-${fI(p.L1_freeze_count)}-${fI(p.L1_unhandoff_count)}`);
    h+=fr('开课率(反算)',fP2(p.L1_open_rate));
    h+=fi('L1_refund_amount','退费金额')+fr('退费率(反算)',fP2(p.L1_cost_refund));
    h+=fi('L1_cost_others','其他成本率');
  }
  h+=fr('一阶收入',fC(m.L1r),`${fC(p.low_price)}×${fI(p.L2_num_low_price)}+${fC(p.reg_price)}×${fI(p.L2_num_reg_price)}`);
  h+=fr('客单价',fC(m.L1up))+fr('税率+集团',fP(p.tax+p.headquarter),`${fP(p.tax)}+${fP(p.headquarter)}`);
  h+='</div>';
  document.getElementById('l1Panel').innerHTML=h;
}

let predTab=0;
const PRED_TARGETS=[.05,.10,.15,.20];
const PRED_LEVERS=[

  {k:'L2_cvr_low_price',l:'二续三率(低价)',dir:1,step:.005,min:0,max:.70,fmt:'p'},

function fmtLever(v,fmt){if(fmt==='p')return fP2(v);if(fmt==='c')return fC(v);if(fmt==='n')return fN(v,2);return fI(v)}
function computeUpliftPlan(targetDelta){
  const baseM=CM(P),basePR=baseM.pR,goalPR=basePR+targetDelta;
  let wp=JSON.parse(JSON.stringify(P)),curPR=basePR;
  const maxIter=500;
  for(let iter=0;iter<maxIter&&curPR<goalPR-1e-6;iter++){
    let bestK=null,bestVal=null,bestGain=-Infinity;
    for(const lev of PRED_LEVERS){
      const cur=wp[lev.k];let nv=cur+lev.dir*lev.step;
      if(lev.dir>0)nv=Math.min(nv,lev.max);else nv=Math.max(nv,lev.min);
      if(Math.abs(nv-cur)<1e-9)continue;
      const tp=JSON.parse(JSON.stringify(wp));tp[lev.k]=nv;
      const gain=CM(tp).pR-curPR;
      if(gain>bestGain+1e-9){bestGain=gain;bestK=lev.k;bestVal=nv}
    }
    if(bestK===null||bestGain<=1e-9)break;
    wp[bestK]=bestVal;curPR+=bestGain;
  }
  const changes=[];
  for(const lev of PRED_LEVERS){
    const orig=P[lev.k],now=wp[lev.k];
    if(Math.abs(orig-now)>1e-9)changes.push({k:lev.k,l:lev.l,from:orig,to:now,fmt:lev.fmt,dir:lev.dir});
  }
  changes.forEach(c=>{const tp=JSON.parse(JSON.stringify(wp));tp[c.k]=P[c.k];c.impact=CM(wp).pR-CM(tp).pR});
  changes.sort((a,b)=>Math.abs(b.impact)-Math.abs(a.impact));
  return{basePR,goalPR,achieved:curPR,changes,feasible:curPR>=goalPR-1e-4};
}

  } else {
    h+='<div class="tw"><table class="pred-tbl"><thead><tr><th>参数</th><th>当前值</th><th></th><th>目标值</th><th>变化</th><th>贡献度</th></tr></thead><tbody>';
    const maxImp=Math.max(1e-9,...r.changes.map(c=>Math.abs(c.impact)));
    r.changes.forEach(c=>{
      const delta=c.to-c.from;
      const ds=c.fmt==='p'?fPt(delta):c.fmt==='c'?`${delta>0?'+':''}${fI(delta)}元`:c.fmt==='n'?`${delta>0?'+':''}${fN(delta,2)}`:`${delta>0?'+':''}${fI(delta)}人`;
      const barW=Math.max(4,Math.round(Math.abs(c.impact)/maxImp*100));
      h+=`<tr><td style="font-weight:700">${c.l}</td><td>${fmtLever(c.from,c.fmt)}</td><td class="pred-arrow">→</td><td style="font-weight:800;color:var(--p)">${fmtLever(c.to,c.fmt)}</td><td class="delta ${delta*c.dir>0?'pos':'neg'}">${ds}</td><td><div class="pred-bar-wrap"><div class="pred-bar-bg"><div class="pred-bar-fill" style="width:${barW}%"></div></div><div class="pred-bar-lbl">${fPt(c.impact)}</div></div></td></tr>`;

    h+='</tbody></table></div>';
    const topC=r.changes.slice(0,3).map(c=>c.l).join('、');
    h+=`<div class="pred-note"><b>关键洞察：</b>影响最大的杠杆是 <b>${topC}</b>。`;
    if(r.feasible) h+=`通过 ${r.changes.length} 项参数组合调整，可将利润率从 <b>${fP2(r.basePR)}</b> 提升至 <b>${fP2(r.goalPR)}</b>。`;
    else h+=`在合理参数范围内最多可提升至 <b>${fP2(r.achieved)}</b>，距目标还差 <b>${fPt(r.goalPR-r.achieved)}</b>。`;
    h+='</div>';
  }
  document.getElementById('predContent').innerHTML=h;
}

// ===== Stage Detail Tabs =====
let stageTab=0; // 0=L2, 1=L3, 2=L4, 3=L5
const STAGE_NAMES=['二阶','三阶','四阶','五阶'];
const STAGE_KEYS=['L2','L3','L4','L5'];

function getStageData(si){
  const p=P,sk=STAGE_KEYS[si];
  // 学员: 缴费 - 退费 - 延期 = 开课
  const paid=p[sk+'_sd_paid']||0;
  const refC=p[sk+'_sd_refund_count']||0;
  const delayC=p[sk+'_sd_delay']||0;
  const openCount=Math.max(0,paid-refC-delayC);
  const openRate=paid>0?openCount/paid:0;
  const refRate=paid>0?refC/paid:0;
  const renewCount=p[sk+'_sd_renew']||0;
  const renewRate=openCount>0?renewCount/openCount:0;
  // 收入: 续费人数 × 下阶学费 = 课程收入; + 其他收入 = 总收入
  const nextTuition=p[sk+'_sd_next_tuition']||0;
  const gmvCourse=renewCount*nextTuition;
  const gmvOther=p[sk+'_sd_gmv_other']||0;
  const gmv=gmvCourse+gmvOther;
  // 上阶结算: 开课人数 × 每人结算单价
  const settlePrice=p[sk+'_sd_settle_price']||0;
  const settleCost=openCount*settlePrice;
  const refAmt=p[sk+'_sd_refund_amt']||0;
  const kitCount=p[sk+'_starter_kit_count']||0;
  const kitRate=openCount>0?kitCount/openCount:0;
  // 人力
  const taCount=p[sk+'_sd_ta_count']||0;
  const taSalary=p[sk+'_sd_ta_salary']||0;
  const sp=p[sk+'_sd_service_period']||1;
  const instrSalary=p[sk+'_sd_instructor_salary']||0;
  const dirSalary=p[sk+'_sd_director_salary']||0;
  const otherCost=p[sk+'_sd_other_cost']||0;
  const taCost=taSalary*taCount*sp;
  const instrCost=instrSalary*sp;
  const dirCost=dirSalary*sp;
  const totalHR=taCost+instrCost+dirCost;
  const taxCost=gmv*(p.tax+p.headquarter);
  const totalCost=settleCost+refAmt+totalHR+otherCost+taxCost;
  const profit=gmv-totalCost;
  const profitRate=gmv>0?profit/gmv:0;
  const hrRatio=gmv>0?totalHR/gmv:0;
  const taLoad=taCount>0?paid/taCount:0;
  return{paid,refC,delayC,openCount,openRate,refRate,renewCount,renewRate,
    nextTuition,gmvCourse,gmvOther,gmv,settlePrice,settleCost,refAmt,kitCount,kitRate,
    taCount,taSalary,sp,instrSalary,dirSalary,taCost,instrCost,dirCost,
    totalHR,otherCost,taxCost,totalCost,profit,profitRate,hrRatio,taLoad};
}

function renderStageDetail(){
  const m=CM(P);
  let tabH='';
  STAGE_NAMES.forEach((n,i)=>{
    tabH+=`<button class="pred-tab${i===stageTab?' active':''}" data-stage-tab="${i}">${n}</button>`;
  });
  document.getElementById('stageTabs').innerHTML=tabH;

  const si=stageTab,sk=STAGE_KEYS[si],d=getStageData(si);
  const fi2=(bid,label)=>{const d2=BD[bid],v=d2.g(P,m);return `<div class="f-row"><div class="f-lbl">${label}</div><input class="f-inp" value="${gDV(v,d2.t,d2.i)}" data-bind="${bid}"/></div>`};
  const fr2=(l,v,f)=>`<div class="f-row"><div class="f-lbl">${l}</div><div class="f-val">${v}</div>${f?`<div class="f-formula">${f}</div>`:''}</div>`;

  let h='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">';

  // ===== Left: 全部可填写 =====
  h+='<div>';
  h+='<div style="font-weight:800;font-size:13px;margin-bottom:8px">📝 经营数据输入</div>';
  h+='<div class="f-grid">';

  h+='<div style="font-weight:700;font-size:11px;color:var(--p);padding:6px 0 2px">👥 学员数据</div>';
  h+=fi2(sk+'_sd_paid','缴费人数');
  h+=fi2(sk+'_sd_refund_count','退费人数');
  h+=fi2(sk+'_sd_delay','延期人数');
  h+=fr2('开课人数',fU(d.openCount),`${fU(d.paid)}-${fU(d.refC)}-${fU(d.delayC)}`);
  h+=fr2('开课率',fP(d.openRate),'开课÷缴费');
  h+=fi2(sk+'_sd_renew','续费人数');
  h+=fr2('续费率',fP(d.renewRate),'续费÷开课');
  h+=fi2(sk+'_starter_kit_count','开学套装购买人数');

  h+='<div style="font-weight:700;font-size:11px;color:var(--p);padding:8px 0 2px">💰 营收</div>';
  h+=fi2(sk+'_sd_next_tuition','下阶学费单价');
  h+=fr2('课程营收',fC(d.gmvCourse),`续费${fU(d.renewCount)}人×${fC(d.nextTuition)}`);
  h+=fi2(sk+'_sd_gmv_other','其他营收');
  h+=fr2('总营收',fC(d.gmv),`${fC(d.gmvCourse)}+${fC(d.gmvOther)}`);

  h+='<div style="font-weight:700;font-size:11px;color:var(--p);padding:8px 0 2px">💸 结算与退费</div>';
  h+=fi2(sk+'_sd_settle_price','上阶结算单价/人');
  h+=fr2('上阶结算费',fC(d.settleCost),`开课${fU(d.openCount)}人×${fC(d.settlePrice)}`);
  h+=fi2(sk+'_sd_refund_amt','课中退费金额');

  h+='<div style="font-weight:700;font-size:11px;color:var(--p);padding:8px 0 2px">👨‍🏫 人力配置（月额）</div>';
  h+=fi2(sk+'_sd_ta_count','二讲人数');
  h+=fi2(sk+'_sd_ta_salary','二讲月薪/人');
  h+=fi2(sk+'_sd_instructor_salary','主讲月薪总额');
  h+=fi2(sk+'_sd_director_salary','导演月薪总额');
  h+=fi2(sk+'_sd_service_period','服务周期(月)');

  h+='<div style="font-weight:700;font-size:11px;color:var(--p);padding:8px 0 2px">📎 其他成本</div>';
  h+=fi2(sk+'_sd_other_cost','其他成本(金额)');

  h+='</div></div>';

  // ===== Right: 看板 (全部自动计算) =====
  h+='<div>';
  h+='<div style="font-weight:800;font-size:13px;margin-bottom:8px">📊 经营结果看板</div>';

  // KPI grid
  h+='<div class="kpi-g" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px">';
  const kpi=(l,v,t,f)=>`<div class="kpi ${t}"><div class="kpi-l">${l}</div><div class="kpi-v">${v}</div>${f?`<div class="kpi-f">${f}</div>`:''}</div>`;
  h+=kpi('总营收',fC(d.gmv),'','课程+其他');
  h+=kpi('利润额',fC(d.profit),d.profit>=0?'good':'bad','营收-总成本');
  h+=kpi('利润率',fP(d.profitRate),d.profitRate>=.15?'good':d.profitRate>=.05?'warn':'bad','利润÷营收');
  h+=kpi('开课率',fP(d.openRate),d.openRate>=.95?'good':d.openRate>=.9?'warn':'bad','开课÷缴费');
  h+=kpi('退费率',fP(d.refRate),d.refRate<=.05?'good':d.refRate<=.1?'warn':'bad','退费÷缴费');
  h+=kpi('续费率',fP(d.renewRate),d.renewRate>=.5?'good':d.renewRate>=.3?'warn':'bad','续费÷开课');
  h+=kpi('开学套装转化率',fP(d.kitRate),d.kitRate>=.5?'good':d.kitRate>=.3?'warn':'bad','套装购买÷开课');
  h+=kpi('人力费比',fP(d.hrRatio),d.hrRatio<=.3?'good':d.hrRatio<=.5?'warn':'bad','人力成本÷营收');
  h+=kpi('二讲带班量',fN(d.taLoad,0)+'人','','缴费÷二讲人数');
  h+='</div>';

  // 成本分解表
  h+='<div style="font-weight:800;font-size:12px;margin:10px 0 6px">💵 成本分解</div>';
  h+='<div class="tw"><table class="dt"><thead><tr><th>项目</th><th>金额</th><th>占营收</th></tr></thead><tbody>';
  const cr2=(l,v)=>`<tr><td>${l}</td><td class="neg">${fC(v)}</td><td>${d.gmv>0?fP(v/d.gmv):'—'}</td></tr>`;
  h+=cr2(`二讲 (${fU(d.taCount)}人×${fC(d.taSalary)}×${d.sp}月)`,d.taCost);
  h+=cr2(`主讲 (${fC(d.instrSalary)}/月×${d.sp}月)`,d.instrCost);
  h+=cr2(`导演 (${fC(d.dirSalary)}/月×${d.sp}月)`,d.dirCost);
  h+=`<tr style="font-weight:700;background:var(--s3)"><td>人力小计</td><td class="neg">${fC(d.totalHR)}</td><td>${d.gmv>0?fP(d.hrRatio):'—'}</td></tr>`;
  h+=cr2(`上阶结算 (${fU(d.openCount)}人×${fC(d.settlePrice)})`,d.settleCost);
  h+=cr2('课中退费金额',d.refAmt);
  h+=cr2('其他成本',d.otherCost);
  h+=cr2(`税费 (${fP(P.tax+P.headquarter)})`,d.taxCost);
  h+=`<tr style="font-weight:800;background:var(--s3)"><td>总成本</td><td class="neg">${fC(d.totalCost)}</td><td>${d.gmv>0?fP(d.totalCost/d.gmv):'—'}</td></tr>`;
  h+=`<tr style="font-weight:800;background:var(--s3)"><td>利润</td><td class="${d.profit>=0?'pos':'neg'}">${fC(d.profit)}</td><td class="${d.profitRate>=0?'pos':'neg'}">${fP(d.profitRate)}</td></tr>`;
  h+='</tbody></table></div>';

  // 月度拆分
  if(d.sp>0&&d.gmv>0){
    h+='<div style="font-weight:800;font-size:12px;margin:14px 0 6px">📅 月度拆分</div>';
    h+='<div class="tw"><table class="dt"><thead><tr><th>月份</th><th>营收</th><th>成本</th><th>利润</th><th>利润率</th></tr></thead><tbody>';
    const mRev=d.gmv/d.sp;
    for(let mi=0;mi<d.sp;mi++){
      const mHR=d.taSalary*d.taCount+d.instrSalary+d.dirSalary;
      const mSettle=d.settleCost/d.sp;
      const mOther=d.otherCost/d.sp;
      const mTax=mRev*(P.tax+P.headquarter);
      const mRef=d.refAmt/d.sp;
      const mCost=mHR+mSettle+mOther+mTax+mRef;
      const mProfit=mRev-mCost;
      const mPR=mRev>0?mProfit/mRev:0;
      h+=`<tr><td>第${mi+1}月</td><td>${fC(mRev)}</td><td class="neg">${fC(mCost)}</td><td class="${mProfit>=0?'pos':'neg'}">${fC(mProfit)}</td><td class="${mPR>=0?'pos':'neg'}">${fP(mPR)}</td></tr>`;
    }
    h+='</tbody></table></div>';
  }

  h+='</div></div>';
  document.getElementById('stageDetailContent').innerHTML=h;
}

function renderScenarios(){
  let h=`<button class="btn btn-sm" id="saveScenario">+ 保存方案</button>`;
  SC.forEach((s,i)=>{h+=`<span class="schip${i===AS?' active':''}" data-si="${i}">${s.name} <span data-sdel="${i}" style="margin-left:3px;cursor:pointer;opacity:.5">×</span></span>`});
  document.getElementById('scenarioBar').innerHTML=h;
}
function render(){if(VM==='actual')syncAR();const m=CM(P);renderL1();renderStage();renderKPI(m);renderFunnel(m);renderCharts(m);renderTable(m);renderImpact(m);renderPredictor();renderScenarios()}

document.addEventListener('click',e=>{
  const t=e.target;
  if(t.id==='reset'){P=JSON.parse(JSON.stringify(DP));AS=-1;render();save();return}
  if(t.id==='export'){const pl={...P};delete pl.content_salary;const b=new Blob([JSON.stringify(pl,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='cohort-params.json';a.click();URL.revokeObjectURL(a.href);return}
  if(t.id==='import'){document.getElementById('import-file').click();return}
  if(t.id==='themeToggle'){const h=document.documentElement,n=h.dataset.theme==='dark'?'light':'dark';h.dataset.theme=n;t.textContent=n==='dark'?'☀️':'🌙';render();save();return}
  if(t.classList?.contains('msw-btn')){VM=t.dataset.mode||'model';document.querySelectorAll('.msw-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===VM));render();save();return}
  if(t.id==='toggleTable'){TV=!TV;document.getElementById('tableWrap').style.display=TV?'block':'none';t.textContent=TV?'收起':'展开';return}
  if(t.dataset.predTab!==undefined){const i=+t.dataset.predTab;if(i!==predTab){predTab=i;renderPredictor()}return}
  if(t.id==='saveScenario'){const name=prompt('方案名称：',`方案${SC.length+1}`);if(!name)return;SC.push({name,params:JSON.parse(JSON.stringify(P))});AS=SC.length-1;renderScenarios();save();return}
  if(t.dataset.si!==undefined&&!t.dataset.sdel){const i=+t.dataset.si;if(SC[i]){P=JSON.parse(JSON.stringify(SC[i].params));AS=i;render();save()}return}
  if(t.dataset.sdel!==undefined){const i=+t.dataset.sdel;SC.splice(i,1);if(AS>=SC.length)AS=SC.length-1;renderScenarios();save();return}
});
document.addEventListener('change',e=>{
  const t=e.target;
  if(t.classList?.contains('f-inp')||t.classList?.contains('tinp')){
    const bid=t.dataset.bind,d=BD[bid];if(!d)return;
    const raw=String(t.value).replace(/,/g,'').trim(),num=Number(raw);
    if(!Number.isFinite(num))return;aB(bid,num);
  }
});
document.getElementById('import-file').addEventListener('change',async e=>{
  const f=e.target.files?.[0];e.target.value='';if(!f)return;
  try{const obj=JSON.parse(await f.text());for(const k in DP)if(typeof obj[k]==='number'&&Number.isFinite(obj[k]))P[k]=obj[k];P.content_salary=DP.content_salary;render();save()}catch(err){}
});
load();document.querySelectorAll('.msw-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===VM));render();
window.addEventListener('resize',()=>{renderCharts(CM(P))});
